<!DOCTYPE html>
<html>
<head>
<title>Smart Campus Navigation</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Smart Campus Navigation System</h2>

<div class="options">

    <div class="input-wrapper">
        <input type="text" id="searchBox" placeholder="Search location...">
        <span class="voiceSearch">
            <i class="fa-solid fa-microphone"></i>
        </span>
        <div class="dropdown" id="searchDropdown"></div>
    </div>
    
    <button class="searchBtn">Search</button>
    <button class="navigateBtn">Navigate</button>
    <button class="current-location">My Location</button>

    <div id="navBox" style="display: none;">

        <div class="input-wrapper">
            <input type="text" id="startBox" class="navigate-inputs" placeholder="Enter Starting point">
            <span class="current-location-icon">
                <i class="fa-solid fa-location-crosshairs"></i>
            </span>
            <div class="dropdown" id="startDropdown"></div>
        </div>

        <div class="input-wrapper">
            <input type="text" id="endBox" class="navigate-inputs" placeholder="Enter Destination">
            <div class="dropdown" id="endDropdown"></div>
        </div>

        <br>
        <button class="directionBtn">Show directions</button>

    </div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>
<script src="script.js"></script>

</body>
</html>
